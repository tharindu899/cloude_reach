<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Account Tracker</title>
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClaudeTrack">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07070f;
  --bg2: #0d0d1a;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --glass: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #e2e2f0;
  --muted: #4a4a6a;
  --muted2: #7a7a9a;

  --accent: #8b5cf6;
  --accent2: #a78bfa;
  --accent-glow: rgba(139,92,246,0.3);
  --accent-dim: rgba(139,92,246,0.1);

  --green: #10d97e;
  --green-glow: rgba(16,217,126,0.25);
  --green-dim: rgba(16,217,126,0.08);

  --red: #ff5370;
  --red-glow: rgba(255,83,112,0.25);
  --red-dim: rgba(255,83,112,0.08);

  --amber: #ffb454;
  --amber-glow: rgba(255,180,84,0.25);
  --amber-dim: rgba(255,180,84,0.08);

  --blue: #38bdf8;
  --blue-dim: rgba(56,189,248,0.1);

  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;

  --radius: 16px;
  --radius-sm: 10px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(139,92,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(16,217,126,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,83,112,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app-wrapper {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 20px 64px;
}

header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeDown 0.6s ease both;
}

.logo-row {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}

.logo-gem { width: 48px; height: 48px; position: relative; }
.logo-gem svg { width: 100%; height: 100%; filter: drop-shadow(0 0 12px var(--accent-glow)); }

h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 60%, var(--green) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.subtitle { font-size: 12px; color: var(--muted2); font-family: var(--mono); letter-spacing: 0.5px; }
.subtitle span { color: var(--accent2); }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  animation: fadeUp 0.6s 0.1s ease both;
}

.config-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--glass);
  border: 1px solid var(--border2);
  border-radius: 50px;
  padding: 10px 18px;
  backdrop-filter: blur(10px);
}

.config-pill label { font-size: 11px; color: var(--muted2); font-family: var(--mono); white-space: nowrap; }

.config-pill input[type="number"] {
  width: 58px;
  background: rgba(139,92,246,0.12);
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: 8px;
  color: var(--amber);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  padding: 5px 8px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}

.config-pill input[type="number"]:focus { border-color: var(--accent); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: auto auto;
  gap: 12px;
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.15s ease both;
  min-width: 0;
}

.stat-card.s-next {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 14px 24px;
  text-align: left;
}

.stat-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.stat-card:hover { transform: translateY(-2px); }
.stat-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
.stat-card.s-active::before { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.stat-card.s-locked::before { background: var(--red);   box-shadow: 0 0 8px var(--red-glow); }
.stat-card.s-ready::before  { background: var(--amber); box-shadow: 0 0 8px var(--amber-glow); }
.stat-card.s-next::before   { background: var(--accent);box-shadow: 0 0 8px var(--accent-glow); }

.stat-icon { display: flex; align-items: center; justify-content: center; margin-bottom: 8px; opacity: 0.7; }
.s-active .stat-icon { color: var(--green); }
.s-locked .stat-icon { color: var(--red); }
.s-ready  .stat-icon { color: var(--amber); }
.s-next   .stat-icon { color: var(--accent2); }

.stat-num { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.stat-num.green  { color: var(--green);   text-shadow: 0 0 20px var(--green-glow); }
.stat-num.red    { color: var(--red);     text-shadow: 0 0 20px var(--red-glow); }
.stat-num.amber  { color: var(--amber);   text-shadow: 0 0 20px var(--amber-glow); }
.stat-num.purple { color: var(--accent2); text-shadow: 0 0 20px var(--accent-glow); }

.stat-label { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }

.filter-bar {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: nowrap;
  animation: fadeUp 0.6s 0.2s ease both;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.filter-btn.active,
.filter-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }

.filter-count { font-size: 9px; background: var(--accent-dim); color: var(--accent2); border-radius: 10px; padding: 1px 5px; margin-left: 3px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.3s;
  animation: cardIn 0.5s ease both;
}

.card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

.card-glow {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
  transition: all 0.3s;
}

.card.locked .card-glow { background: var(--red);   box-shadow: 0 0 12px var(--red-glow); }
.card.ready  .card-glow { background: var(--amber); box-shadow: 0 0 12px var(--amber-glow); }

.card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle at top right, rgba(139,92,246,0.06), transparent 70%);
  pointer-events: none;
}

.card.locked::after { background: radial-gradient(circle at top right, rgba(255,83,112,0.06), transparent 70%); }
.card.ready::after  { background: radial-gradient(circle at top right, rgba(255,180,84,0.06), transparent 70%); }

.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.acct-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
.acct-pos  { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

.badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-family: var(--mono);
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,217,126,0.2); }
.badge-locked { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,83,112,0.2); }
.badge-ready  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,180,84,0.2); }

.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: var(--green); animation: pulse 2s infinite; }
.dot-red   { background: var(--red); }
.dot-amber { background: var(--amber); animation: pulse 1.5s infinite; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.email-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  margin-bottom: 14px;
  width: 100%;
}

.email-icon { display:flex; align-items:center; opacity: 0.45; flex-shrink: 0; color: var(--muted2); }
.email-text { font-size: 11px; color: var(--muted2); font-family: var(--mono); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 10px;
  color: var(--muted);
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.copy-btn:hover { color: var(--accent2); background: var(--accent-dim); }

.sep { height: 1px; background: var(--border); margin: 12px 0; }

.unlock-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.unlock-label { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; }
.unlock-val   { font-size: 11px; font-family: var(--mono); font-weight: 700; }
.uv-dim   { color: var(--muted); }
.uv-amber { color: var(--amber); }
.uv-green { color: var(--green); }

.progress-wrap { height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
.progress-bar  { height: 100%; border-radius: 3px; background: var(--green); transition: width 1s linear, background 0.3s; width: 0%; }

.countdown-box {
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  text-align: center;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.countdown-box.locked-box { border-color: rgba(255,83,112,0.2); background: rgba(255,83,112,0.04); }
.countdown-box.ready-box  { border-color: rgba(16,217,126,0.2); background: rgba(16,217,126,0.04); }

.cd-timer  { font-size: 26px; font-family: var(--mono); font-weight: 700; letter-spacing: 3px; color: var(--amber); text-shadow: 0 0 20px var(--amber-glow); line-height: 1; }
.cd-ready  { font-size: 13px; font-family: var(--mono); font-weight: 700; color: var(--green); text-shadow: 0 0 16px var(--green-glow); }
.cd-idle   { font-size: 20px; font-family: var(--mono); color: var(--muted); letter-spacing: 3px; }
.cd-sublabel { font-size: 9px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

.input-label { font-size: 10px; color: var(--muted2); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }

.time-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 10px;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
  color-scheme: dark;
}

.time-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

.notes-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted2);
  font-family: var(--sans);
  font-size: 11px;
  padding: 7px 10px;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
  resize: none;
  height: 48px;
}

.notes-input:focus { border-color: var(--border2); color: var(--text); }
.notes-input::placeholder { color: var(--muted); }

/* ── HOLD-TO-CONFIRM BUTTONS ── */
.btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  padding: 9px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* Hold fill overlay */
.btn-hold-fill {
  position: absolute;
  inset: 0;
  width: 0%;
  background: rgba(255,255,255,0.15);
  transition: none;
  pointer-events: none;
  border-radius: inherit;
}

.btn.holding .btn-hold-fill {
  width: 100%;
  transition: width 0.75s linear;
}

/* Button color variants */
.btn-lock-now {
  background: var(--accent-dim);
  color: var(--accent2);
  border-color: rgba(139,92,246,0.25);
}
.btn-lock-now:not(:disabled):hover { background: rgba(139,92,246,0.2); box-shadow: 0 0 16px rgba(139,92,246,0.2); }

.btn-set-lock {
  background: var(--red-dim);
  color: var(--red);
  border-color: rgba(255,83,112,0.2);
}
.btn-set-lock:not(:disabled):hover { background: rgba(255,83,112,0.15); box-shadow: 0 0 16px var(--red-glow); }

.btn-free {
  background: var(--green-dim);
  color: var(--green);
  border-color: rgba(16,217,126,0.2);
}
.btn-free:not(:disabled):hover { background: rgba(16,217,126,0.15); box-shadow: 0 0 16px var(--green-glow); }

/* Hold hint label */
.hold-hint {
  text-align: center;
  font-size: 9px;
  font-family: var(--mono);
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  opacity: 0.6;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(16,217,126,0.12);
  border: 1px solid rgba(16,217,126,0.3);
  color: var(--green);
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px 20px;
  border-radius: 50px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 1000;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer { text-align: center; margin-top: 48px; font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.5px; }
footer span { color: var(--accent2); }

@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
@keyframes cardIn   { from{opacity:0;transform:translateY(20px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

.card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.10s}
.card:nth-child(3){animation-delay:0.15s} .card:nth-child(4){animation-delay:0.20s}
.card:nth-child(5){animation-delay:0.25s} .card:nth-child(6){animation-delay:0.30s}
.card:nth-child(7){animation-delay:0.35s} .card:nth-child(8){animation-delay:0.40s}

@media (max-width: 640px) {
  h1 { font-size: 22px; }
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-card { padding: 12px 8px; }
  .stat-num { font-size: 20px; }
  .stat-icon { font-size: 14px; }
  .grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; }
  .cd-timer { font-size: 22px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.5); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app-wrapper">

  <header>
    <div class="logo-row">
      <div class="logo-gem">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="24,2 44,16 44,32 24,46 4,32 4,16" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.6)" stroke-width="1.5"/>
          <polygon points="24,8 38,18 38,30 24,40 10,30 10,18" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
          <circle cx="24" cy="24" r="4" fill="#a78bfa"/>
        </svg>
      </div>
      <h1>Claude Tracker</h1>
    </div>
    <p class="subtitle">free plan · <span id="total-count">0</span> accounts · <span id="live-clock">--:--:--</span></p>
  </header>

  <div class="toolbar">
    <div class="config-pill">
      <label for="resetHours"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Reset window</label>
      <input type="number" id="resetHours" value="5" min="1" max="24" step="0.5">
      <label for="resetHours">hrs / cycle</label>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card s-active">
      <span class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      <div class="stat-num green" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-card s-locked">
      <span class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <div class="stat-num red" id="stat-locked">0</div>
      <div class="stat-label">Locked</div>
    </div>
    <div class="stat-card s-ready">
      <span class="stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
      <div class="stat-num amber" id="stat-ready">0</div>
      <div class="stat-label">Ready</div>
    </div>
    <div class="stat-card s-next">
      <span class="stat-icon" style="margin:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      <div>
        <div class="stat-num purple" id="stat-next" style="font-size:22px;letter-spacing:2px;line-height:1">—</div>
        <div class="stat-label" style="margin-top:4px;text-align:left">Next Unlock</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="fc-all">0</span></button>
    <button class="filter-btn" data-filter="active">Active <span class="filter-count" id="fc-active">0</span></button>
    <button class="filter-btn" data-filter="locked">Locked <span class="filter-count" id="fc-locked">0</span></button>
    <button class="filter-btn" data-filter="ready">Ready <span class="filter-count" id="fc-ready">0</span></button>
  </div>

  <div class="grid" id="grid"></div>

  <footer>saved in browser · updates every second · <span>Claude Account Tracker</span></footer>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const DEFAULT_ACCOUNTS = [
  { name: 'Tharindu',  email: 'tprabath81@gmail.com' },
  { name: 'lakshan',   email: 'prabath99t@gmail.com' },
  { name: 'malli',   email: 'tprabath84@gmail.com' },
  { name: 'Diana',     email: 'crypto.th99@gmail.com' },
  { name: 'Eve',       email: 'rema99.praba@gmail.com' },
  // { name: 'Frank',  email: 'frank@outlook.com' },
  // { name: 'Grace',  email: 'grace@yahoo.com' },
  // { name: 'Henry',  email: 'henry@proton.me' },
  // Add more accounts below — they'll show up automatically:
  // { name: 'Iris',   email: 'iris@gmail.com' },
  // { name: 'Jack',   email: 'jack@outlook.com' },
];

const ACCOUNTS_KEY = 'clt_v7';
const RESET_KEY    = 'clt_reset_v3';
const TOTAL        = DEFAULT_ACCOUNTS.length;
const HOLD_MS      = 750; // hold duration in ms

let activeFilter = 'all';

// ─── STATE ────────────────────────────────────────────────
let resetHours = parseFloat(localStorage.getItem(RESET_KEY) || 5);

function loadAccounts() {
  try {
    const saved = JSON.parse(localStorage.getItem(ACCOUNTS_KEY));
    if (saved && Array.isArray(saved) && saved.length === TOTAL) {
      return saved.map((s, i) => ({
        name:       DEFAULT_ACCOUNTS[i].name,
        email:      DEFAULT_ACCOUNTS[i].email,
        locked:     s.locked   || false,
        lockTime:   s.lockTime || null,
        unlockTime: s.unlockTime || null,
        notes:      s.notes    || '',
      }));
    }
  } catch(e) {}
  return DEFAULT_ACCOUNTS.map(a => ({
    name: a.name, email: a.email,
    locked: false, lockTime: null, unlockTime: null, notes: '',
  }));
}

function save() { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); }

let accounts = loadAccounts();

// ─── UTILS ────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), n = new Date();
  if (d.toDateString() === n.toDateString()) return 'Today';
  const tm = new Date(n); tm.setDate(tm.getDate()+1);
  if (d.toDateString() === tm.toDateString()) return 'Tomorrow';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtCountdown(ms) {
  if (ms <= 0) return null;
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function tsToLocal(ts) {
  const d=new Date(ts||Date.now()), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function esc(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

// ─── TOAST ────────────────────────────────────────────────
let toastTimer;
function showToast(msg, color='green') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color==='green' ? 'rgba(16,217,126,0.12)' : color==='red' ? 'rgba(255,83,112,0.12)' : 'rgba(139,92,246,0.12)';
  el.style.borderColor = color==='green' ? 'rgba(16,217,126,0.3)' : color==='red' ? 'rgba(255,83,112,0.3)' : 'rgba(139,92,246,0.3)';
  el.style.color = color==='green' ? 'var(--green)' : color==='red' ? 'var(--red)' : 'var(--accent2)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── LIVE CLOCK ───────────────────────────────────────────
function updateClock() {
  const cl = document.getElementById('live-clock');
  if (cl) cl.textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}

// ─── HOLD-TO-CONFIRM ─────────────────────────────────────
function makeHoldButton(btn, callback) {
  let holdTimer = null;
  let fillEl = btn.querySelector('.btn-hold-fill');

  function startHold(e) {
    if (btn.disabled) return;
    e.preventDefault();
    btn.classList.add('holding');
    holdTimer = setTimeout(() => {
      btn.classList.remove('holding');
      callback();
    }, HOLD_MS);
  }

  function cancelHold() {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    btn.classList.remove('holding');
  }

  btn.addEventListener('pointerdown', startHold);
  btn.addEventListener('pointerup',   cancelHold);
  btn.addEventListener('pointerleave',cancelHold);
  btn.addEventListener('pointercancel',cancelHold);
  // prevent regular click from firing
  btn.addEventListener('click', e => e.preventDefault());
}

// ─── BUILD CARDS ──────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('total-count').textContent = TOTAL;
  document.getElementById('resetHours').value = resetHours;

  accounts.forEach((acc, i) => {
    const card = document.createElement('div');
    card.id = `card-${i}`;
    card.className = 'card';

    card.innerHTML = `
      <div class="card-glow" id="glow-${i}"></div>

      <div class="card-header">
        <div class="acct-info">
          <div class="acct-name">${esc(acc.name)}</div>
          <div class="acct-pos">Account #${i+1}</div>
        </div>
        <span class="badge badge-active" id="badge-${i}">
          <span class="badge-dot dot-green" id="dot-${i}"></span>
          <span id="badge-txt-${i}">ACTIVE</span>
        </span>
      </div>

      <div class="email-chip">
        <span class="email-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
        <span class="email-text" title="${esc(acc.email)}">${esc(acc.email)}</span>
        <button class="copy-btn" id="copy-${i}" title="Copy email"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="prog-${i}"></div>
      </div>

      <div class="unlock-row">
        <span class="unlock-label">Unlocks at</span>
        <span class="unlock-val uv-dim" id="unlockat-${i}">—</span>
      </div>

      <div class="countdown-box" id="cdbox-${i}">
        <div class="cd-idle" id="cd-${i}">--:--:--</div>
        <div class="cd-sublabel" id="cd-lbl-${i}">not locked</div>
      </div>

      <div class="sep"></div>

      <label class="input-label">Set unlock time</label>
      <input class="time-input" type="datetime-local" id="tp-${i}" value="${tsToLocal(Date.now())}">

      <textarea class="notes-input" id="notes-${i}" placeholder="Notes (optional)…">${esc(acc.notes)}</textarea>

      <div class="hold-hint">hold buttons to confirm</div>

      <div class="btn-row">
        <button class="btn btn-lock-now" id="btn-now-${i}">
          <div class="btn-hold-fill"></div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Lock Now
        </button>
        <button class="btn btn-set-lock" id="btn-lock-${i}">
          <div class="btn-hold-fill"></div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Set Lock
        </button>
        <button class="btn btn-free" id="btn-unlock-${i}" disabled>
          <div class="btn-hold-fill"></div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Free
        </button>
      </div>
    `;

    grid.appendChild(card);

    // EVENTS — copy (normal tap ok)
    document.getElementById(`copy-${i}`).addEventListener('click', () => {
      navigator.clipboard.writeText(acc.email).then(() => showToast(`Copied ${acc.email}`, 'purple'));
    });

    document.getElementById(`notes-${i}`).addEventListener('input', e => {
      accounts[i].notes = e.target.value;
      save();
    });

    // HOLD-TO-CONFIRM for action buttons
    makeHoldButton(document.getElementById(`btn-now-${i}`), () => {
      const unlockTs = Date.now() + resetHours * 3600000;
      accounts[i].locked = true;
      accounts[i].unlockTime = unlockTs;
      accounts[i].lockTime = Date.now();
      document.getElementById(`tp-${i}`).value = tsToLocal(unlockTs);
      save(); updateStats(); showToast(`${acc.name} locked — unlocks in ${resetHours}h`, 'red');
    });

    makeHoldButton(document.getElementById(`btn-lock-${i}`), () => {
      const picker = document.getElementById(`tp-${i}`);
      const unlockTs = picker && picker.value ? new Date(picker.value).getTime() : null;
      if (!unlockTs || isNaN(unlockTs)) { showToast('Pick a valid unlock time', 'red'); return; }
      if (unlockTs <= Date.now()) { showToast('Unlock time must be in the future', 'red'); return; }
      accounts[i].locked = true;
      accounts[i].unlockTime = unlockTs;
      accounts[i].lockTime = Date.now();
      save(); updateStats(); showToast(`${acc.name} locked until ${fmtTime(unlockTs)}`, 'red');
    });

    makeHoldButton(document.getElementById(`btn-unlock-${i}`), () => {
      accounts[i].locked = false;
      accounts[i].lockTime = null;
      accounts[i].unlockTime = null;
      save(); updateStats(); showToast(`${acc.name} is now free`, 'green');
    });
  });
}

// ─── UPDATE CARD ──────────────────────────────────────────
function updateCard(i) {
  const acc = accounts[i];
  const now = Date.now();
  const rem = acc.unlockTime ? acc.unlockTime - now : 0;
  const isLocked = acc.locked && rem > 0;
  const isReady  = acc.locked && rem <= 0 && !!acc.lockTime;

  const cardEl = document.getElementById(`card-${i}`);
  if (cardEl) cardEl.className = 'card' + (isLocked ? ' locked' : isReady ? ' ready' : '');

  const badge = document.getElementById(`badge-${i}`);
  if (badge) badge.className = 'badge ' + (isLocked ? 'badge-locked' : isReady ? 'badge-ready' : 'badge-active');

  const dot = document.getElementById(`dot-${i}`);
  if (dot) dot.className = 'badge-dot ' + (isLocked ? 'dot-red' : isReady ? 'dot-amber' : 'dot-green');

  const btxt = document.getElementById(`badge-txt-${i}`);
  if (btxt) btxt.textContent = isLocked ? 'LOCKED' : isReady ? 'READY' : 'ACTIVE';

  const uEl = document.getElementById(`unlockat-${i}`);
  if (uEl) {
    if (acc.unlockTime) {
      uEl.innerHTML = `${fmtTime(acc.unlockTime)} &nbsp;·&nbsp; ${fmtDate(acc.unlockTime)}`;
      uEl.className = 'unlock-val ' + (isLocked ? 'uv-amber' : 'uv-green');
    } else {
      uEl.textContent = '—';
      uEl.className = 'unlock-val uv-dim';
    }
  }

  const prog = document.getElementById(`prog-${i}`);
  if (prog) {
    if (isLocked && acc.lockTime && acc.unlockTime) {
      const total = acc.unlockTime - acc.lockTime;
      const elapsed = now - acc.lockTime;
      const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
      prog.style.width = pct + '%';
      prog.style.background = pct > 80 ? 'var(--amber)' : 'var(--red)';
    } else if (isReady) {
      prog.style.width = '100%';
      prog.style.background = 'var(--green)';
    } else {
      prog.style.width = '0%';
    }
  }

  const cdEl  = document.getElementById(`cd-${i}`);
  const cdLbl = document.getElementById(`cd-lbl-${i}`);
  const cdBox = document.getElementById(`cdbox-${i}`);
  if (cdEl && cdLbl && cdBox) {
    if (isLocked) {
      cdEl.className = 'cd-timer';
      cdEl.textContent = fmtCountdown(rem);
      cdLbl.textContent = 'time until unlock';
      cdBox.className = 'countdown-box locked-box';
    } else if (isReady) {
      cdEl.className = 'cd-ready';
      cdEl.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px"><polyline points="20 6 9 17 4 12"/></svg>Limit reset — use now';
      cdLbl.textContent = '';
      cdBox.className = 'countdown-box ready-box';
    } else {
      cdEl.className = 'cd-idle';
      cdEl.textContent = '--:--:--';
      cdLbl.textContent = 'not locked';
      cdBox.className = 'countdown-box';
    }
  }

  const ubtn = document.getElementById(`btn-unlock-${i}`);
  if (ubtn) ubtn.disabled = !acc.locked;

  if (cardEl) {
    const state = isLocked ? 'locked' : isReady ? 'ready' : 'active';
    cardEl.style.display = (activeFilter === 'all' || activeFilter === state) ? '' : 'none';
  }
}

// ─── UPDATE STATS ─────────────────────────────────────────
function updateStats() {
  const now = Date.now();
  let nActive=0, nLocked=0, nReady=0, nextMs=Infinity;

  accounts.forEach(acc => {
    const rem = acc.unlockTime ? acc.unlockTime - now : 0;
    if (acc.locked && rem > 0) {
      nLocked++;
      if (rem < nextMs) nextMs = rem;
    } else if (acc.locked && rem <= 0 && acc.lockTime) {
      nReady++;
    } else {
      nActive++;
    }
  });

  document.getElementById('stat-active').textContent = nActive;
  document.getElementById('stat-locked').textContent = nLocked;
  document.getElementById('stat-ready').textContent  = nReady;
  document.getElementById('stat-next').textContent   = nextMs < Infinity ? fmtCountdown(nextMs) : '—';

  document.getElementById('fc-all').textContent    = TOTAL;
  document.getElementById('fc-active').textContent = nActive;
  document.getElementById('fc-locked').textContent = nLocked;
  document.getElementById('fc-ready').textContent  = nReady;

  accounts.forEach((_, i) => updateCard(i));
}

// ─── INIT ─────────────────────────────────────────────────
document.getElementById('resetHours').addEventListener('change', e => {
  resetHours = parseFloat(e.target.value) || 5;
  localStorage.setItem(RESET_KEY, resetHours);
  updateStats();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    updateStats();
  });
});

// PWA setup
(function() {
  function generateIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#07070f'; ctx.fillRect(0,0,size,size);
    const cx=size/2, cy=size/2, r=size*0.38;
    ctx.fillStyle='rgba(139,92,246,0.15)';
    ctx.strokeStyle='rgba(139,92,246,0.8)';
    ctx.lineWidth=size*0.04;
    const pts=6;
    ctx.beginPath();
    for(let i=0;i<pts;i++){
      const a=Math.PI/2+(2*Math.PI/pts)*i;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#a78bfa';
    ctx.beginPath(); ctx.arc(cx,cy,size*0.08,0,Math.PI*2); ctx.fill();
    return canvas.toDataURL('image/png');
  }
  const manifest={name:"Claude Account Tracker",short_name:"ClaudeTrack",start_url:location.href,display:"standalone",background_color:"#07070f",theme_color:"#8b5cf6",icons:[{src:generateIcon(192),sizes:"192x192",type:"image/png"},{src:generateIcon(512),sizes:"512x512",type:"image/png"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
  if('serviceWorker' in navigator){
    const sw=`const C='claude-tracker-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['${location.href}'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`;
    const swBlob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'/'}).catch(()=>{});
  }
})();

buildCards();
updateStats();
updateClock();
setInterval(() => { updateStats(); updateClock(); }, 1000);
</script>
</body>
</html>
