<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.15);
        --text: #e8e8f0; --muted: #6b6b82;
        --accent: #7c6af7; --accent-dim: rgba(124,106,247,0.15);
        --green: #22c97a; --green-dim: rgba(34,201,122,0.12);
        --red: #f25c54; --red-dim: rgba(242,92,84,0.12);
        --amber: #f0a843; --amber-dim: rgba(240,168,67,0.12);
        --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 24px 16px 48px; }
    header { text-align: center; margin-bottom: 28px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .logo-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--accent-dim); border: 1px solid rgba(124,106,247,0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .subtitle { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }
    .config-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0 auto 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 20px; max-width: 420px; flex-wrap: wrap; }
    .config-label { font-size: 12px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    .config-bar input[type="number"] { width: 60px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--amber); font-family: var(--mono); font-size: 13px; font-weight: 600; padding: 5px 8px; text-align: center; outline: none; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 900px; margin: 0 auto 24px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; font-family: var(--mono); }
    .stat-num.green { color: var(--green); } .stat-num.red { color: var(--red); } .stat-num.amber { color: var(--amber); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; max-width: 1100px; margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); transition: background 0.3s; }
    .card.locked::before { background: var(--red); }
    .card.ready::before { background: var(--amber); }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .acct-num { font-size: 20px; font-family: var(--sans); font-weight: 700; color: #ffffff; letter-spacing: 0.3px; }
    .acct-pos { font-size: 10px; color: var(--muted); margin-left: 6px; font-family: var(--mono); }
    .status-badge { font-size: 11px; font-family: var(--mono); font-weight: 600; padding: 3px 9px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
    .badge-active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,201,122,0.25); }
    .badge-locked { background: var(--red-dim); color: var(--red); border: 1px solid rgba(242,92,84,0.25); }
    .badge-ready  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,168,67,0.25); }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); animation: blink 2s infinite; }
    .dot-red   { background: var(--red); }
    .dot-amber { background: var(--amber); animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .email-display { font-size: 12px; color: var(--text); font-family: var(--mono); margin-bottom: 8px; word-break: break-all; }
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .info-label { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .info-val { font-size: 12px; font-family: var(--mono); font-weight: 500; }
    .val-dim { color: var(--muted); } .val-amber { color: var(--amber); } .val-green { color: var(--green); }
    .countdown-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin: 10px 0; text-align: center; }
    .cd-live { font-size: 22px; font-family: var(--mono); font-weight: 700; letter-spacing: 3px; color: var(--amber); }
    .cd-done { font-size: 14px; font-family: var(--mono); font-weight: 600; color: var(--green); }
    .cd-idle { font-size: 13px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; }
    .cd-label { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .sep { height: 1px; background: var(--border); margin: 10px 0; }
    .section-label { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; }
    .time-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 6px 8px; outline: none; margin-bottom: 8px; }
    .time-input:focus { border-color: var(--accent); }
    .time-input::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .three-btn { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
    button { font-family: var(--sans); font-size: 11px; font-weight: 600; padding: 8px 4px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .btn-now { background: var(--accent-dim); color: var(--accent); border-color: rgba(124,106,247,0.25); }
    .btn-now:hover { background: rgba(124,106,247,0.25); }
    .btn-lock { background: var(--red-dim); color: var(--red); border-color: rgba(242,92,84,0.2); }
    .btn-lock:hover { background: rgba(242,92,84,0.22); }
    .btn-unlock { background: var(--green-dim); color: var(--green); border-color: rgba(34,201,122,0.2); }
    .btn-unlock:hover { background: rgba(34,201,122,0.22); }
    .btn-unlock:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-reset-all { background: transparent; color: var(--muted); border: 1px solid var(--border2); font-size: 10px; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-family: var(--mono); }
    .btn-reset-all:hover { color: var(--red); border-color: rgba(242,92,84,0.4); background: var(--red-dim); }
    .toolbar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    footer { text-align: center; margin-top: 36px; font-size: 11px; font-family: var(--mono); color: var(--muted); }
</style>
</head>
<body>
<header>
<div class="logo">
    <div class="logo-icon">◆</div>
    <h1>Claude Account Tracker</h1>
</div>
<p class="subtitle" id="subtitle">free plan · <span id="total-count">0</span> accounts · auto-saved</p>
</header>
<div class="toolbar">
    <div class="config-bar">
        <span class="config-label">Reset window:</span>
        <input type="number" id="resetHours" value="5" min="1" max="24" step="0.5">
        <span class="config-label">hours per cycle</span>
    </div>
    <button class="btn-reset-all" id="btn-reset-all" title="Unlock all accounts & clear all timers">↺ Reset All</button>
</div>
<div class="stats-row">
    <div class="stat"><div class="stat-num green" id="stat-active">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num red" id="stat-locked">0</div><div class="stat-label">Locked</div></div>
    <div class="stat"><div class="stat-num amber" id="stat-next">—</div><div class="stat-label">Next Unlock</div></div>
</div>
<div class="grid" id="grid"></div>
<footer>saved in browser · updates every second</footer>

<script>
    // ==================== PWA SETUP ====================
    (function() {
        // Generate a diamond icon dynamically
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            // Background
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, size, size);
            // Diamond shape
            const s = size * 0.6;
            const x = size/2;
            const y = size/2;
            ctx.fillStyle = 'rgba(124,106,247,0.2)';
            ctx.strokeStyle = 'rgba(124,106,247,0.8)';
            ctx.lineWidth = size * 0.05;
            ctx.beginPath();
            ctx.moveTo(x, y - s/2);
            ctx.lineTo(x + s/2, y);
            ctx.lineTo(x, y + s/2);
            ctx.lineTo(x - s/2, y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // Inner dot
            ctx.fillStyle = '#7c6af7';
            ctx.beginPath();
            ctx.arc(x, y, size*0.08, 0, Math.PI*2);
            ctx.fill();
            return canvas.toDataURL('image/png');
        }

        const icon192 = generateIcon(192);
        const icon512 = generateIcon(512);

        const manifest = {
            name: "Claude Account Tracker",
            short_name: "ClaudeTrack",
            start_url: location.href,
            display: "standalone",
            background_color: "#0a0a0f",
            theme_color: "#7c6af7",
            icons: [
                { src: icon192, sizes: "192x192", type: "image/png" },
                { src: icon512, sizes: "512x512", type: "image/png" }
            ]
        };

        // Create manifest blob URL
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        // Service worker registration (inline via blob)
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'claude-tracker-v2';
                const urlsToCache = [
                    '${location.href}',
                    'https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap'
                ];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                    );
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => {
                            return response || fetch(event.request);
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, {scope: '/'})
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.log('Service Worker registration failed', err));
        }
    })();

    // ==================== MAIN APPLICATION LOGIC ====================
        const DEFAULT_ACCOUNTS = [
            { name: 'tharindu', email: 'tprabath81@gmail.com' },
            { name: 'Bob', email: 'prabath99t@gmail.com' },
            { name: 'Charlie', email: 'tprabath84@gmail.com' },
            { name: 'Diana', email: 'crypto.th99@gmail.com' },
            { name: 'Eve', email: 'rema99.praba@gmail.com' },
            // { name: 'Frank', email: 'frank@outlook.com' },
            // { name: 'Grace', email: 'grace@yahoo.com' },
            // { name: 'Henry', email: 'henry@proton.me' },
            // { name: 'Iris', email: 'iris@gmail.com' },
            // { name: 'Jack', email: 'jack@outlook.com' },
            // Add more accounts below — they'll show up automatically:
            // { name: 'Kate', email: 'kate@gmail.com' },
            // { name: 'Leo', email: 'leo@yahoo.com' },
            // { name: 'Mia', email: 'mia@proton.me' },
            // { name: 'Noah', email: 'noah@gmail.com' },
            // { name: 'Olivia', email: 'olivia@outlook.com' },
            // { name: 'Paul', email: 'paul@yahoo.com' },
            // { name: 'Quinn', email: 'quinn@proton.me' },
            // { name: 'Rose', email: 'rose@gmail.com' },
            // { name: 'Sam', email: 'sam@outlook.com' },
            // { name: 'Tina', email: 'tina@yahoo.com' },
        ];

    const ACCOUNTS_KEY = 'clt_v6';
    const RESET_KEY = 'clt_reset_v2';
    const TOTAL = DEFAULT_ACCOUNTS.length;

    let resetHours = parseFloat(localStorage.getItem(RESET_KEY) || 5);
    document.getElementById('resetHours').value = resetHours;
    document.getElementById('total-count').textContent = TOTAL;
    document.getElementById('resetHours').addEventListener('change', e => {
        resetHours = parseFloat(e.target.value) || 5;
        localStorage.setItem(RESET_KEY, resetHours);
        updateStats();
    });

    function getDisplayName(email) {
        if (!email) return 'Account';
        const atIndex = email.indexOf('@');
        return atIndex > 0 ? email.substring(0, atIndex) : email;
    }

    function loadAccounts() {
        try {
            const saved = JSON.parse(localStorage.getItem(ACCOUNTS_KEY));
            if (saved && Array.isArray(saved) && saved.length === TOTAL) {
                return saved.map((s, i) => ({
                    name: DEFAULT_ACCOUNTS[i].name,
                    email: s.email || DEFAULT_ACCOUNTS[i].email,
                    locked: s.locked || false,
                    lockTime: s.lockTime || null,
                    unlockTime: s.unlockTime || null,
                }));
            }
        } catch (e) { /* fall through */ }
        return DEFAULT_ACCOUNTS.map(a => ({
            name: a.name,
            email: a.email,
            locked: false,
            lockTime: null,
            unlockTime: null,
        }));
    }

    function save() { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); }
    let accounts = loadAccounts();

    function fmtTime(ts) { if(!ts) return '—'; return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}); }
    function fmtDate(ts) {
        if(!ts) return '';
        const d=new Date(ts), n=new Date();
        if(d.toDateString()===n.toDateString()) return 'Today';
        const tm=new Date(n); tm.setDate(tm.getDate()+1);
        if(d.toDateString()===tm.toDateString()) return 'Tomorrow';
        return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }
    function fmtCountdown(ms) {
        if(ms<=0) return null;
        const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000), s=Math.floor((ms%60000)/1000);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    function tsToLocal(ts) {
        const d=new Date(ts), p=n=>String(n).padStart(2,'0');
        return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function escapeHtml(str) { const div=document.createElement('div'); div.textContent=str; return div.innerHTML; }

    function buildCards() {
        const grid=document.getElementById('grid');
        grid.innerHTML='';
        accounts.forEach((acc,i)=>{
            const card=document.createElement('div');
            card.id=`card-${i}`;
            card.className='card';
            card.innerHTML=`
                <div class="card-top">
                    <div>
                        <span class="acct-num" id="acct-title-${i}">${escapeHtml(getDisplayName(acc.name))}</span>
                        <span class="acct-pos">#${i+1}</span>
                    </div>
                    <span class="status-badge badge-active" id="badge-${i}">
                        <span class="dot dot-green" id="dot-${i}"></span>
                        <span id="badge-txt-${i}">ACTIVE</span>
                    </span>
                </div>
                <div class="email-display">${escapeHtml(acc.email)}</div>
                <div class="sep"></div>
                <div class="info-row">
                    <span class="info-label">unlock at</span>
                    <span class="info-val val-dim" id="unlockat-${i}">—</span>
                </div>
                <div class="countdown-box">
                    <div class="cd-idle" id="cd-${i}">--:--:--</div>
                    <div class="cd-label" id="cd-lbl-${i}">not locked</div>
                </div>
                <div class="sep"></div>
                <p class="section-label">Set unlock time → press Set Lock</p>
                <input class="time-input" type="datetime-local" id="tp-${i}" value="${tsToLocal(Date.now())}" />
                <div class="three-btn">
                    <button class="btn-now" id="btn-now-${i}">Lock Now</button>
                    <button class="btn-lock" id="btn-lock-${i}">⛔ Set Lock</button>
                    <button class="btn-unlock" id="btn-unlock-${i}" disabled>✓ Free</button>
                </div>
            `;
            grid.appendChild(card);

            document.getElementById(`btn-lock-${i}`).addEventListener('click', ()=>{
                const picker=document.getElementById(`tp-${i}`);
                let unlockTs=picker&&picker.value?new Date(picker.value).getTime():null;
                if(!unlockTs||isNaN(unlockTs))return;
                accounts[i].locked=true; accounts[i].unlockTime=unlockTs; accounts[i].lockTime=unlockTs-resetHours*3600000;
                save(); updateStats();
            });
            document.getElementById(`btn-now-${i}`).addEventListener('click', ()=>{
                const unlockTs=Date.now()+resetHours*3600000;
                accounts[i].locked=true; accounts[i].unlockTime=unlockTs; accounts[i].lockTime=Date.now();
                document.getElementById(`tp-${i}`).value=tsToLocal(unlockTs);
                save(); updateStats();
            });
            document.getElementById(`btn-unlock-${i}`).addEventListener('click', ()=>{
                accounts[i].locked=false; accounts[i].lockTime=null; accounts[i].unlockTime=null;
                save(); updateStats();
            });
        });
    }

    function updateCard(i) {
        const acc=accounts[i];
        const now=Date.now();
        const rem=acc.unlockTime?acc.unlockTime-now:0;
        const isLocked=acc.locked&&rem>0;
        const isReady=acc.locked&&rem<=0&&!!acc.lockTime;
        const cardEl=document.getElementById(`card-${i}`);
        if(cardEl) cardEl.className='card'+(isLocked?' locked':isReady?' ready':'');
        const badge=document.getElementById(`badge-${i}`);
        if(badge) badge.className='status-badge '+(isLocked?'badge-locked':isReady?'badge-ready':'badge-active');
        const dot=document.getElementById(`dot-${i}`);
        if(dot) dot.className='dot '+(isLocked?'dot-red':isReady?'dot-amber':'dot-green');
        document.getElementById(`badge-txt-${i}`).textContent=isLocked?'LOCKED':isReady?'READY':'ACTIVE';
        const unlockEl=document.getElementById(`unlockat-${i}`);
        if(unlockEl){
            if(acc.unlockTime){
                unlockEl.innerHTML=`${fmtTime(acc.unlockTime)} &nbsp;·&nbsp; ${fmtDate(acc.unlockTime)}`;
                unlockEl.className='info-val '+(isLocked?'val-amber':'val-green');
            }else{unlockEl.textContent='—'; unlockEl.className='info-val val-dim';}
        }
        const cdEl=document.getElementById(`cd-${i}`);
        const cdLbl=document.getElementById(`cd-lbl-${i}`);
        if(cdEl&&cdLbl){
            if(isLocked){cdEl.className='cd-live'; cdEl.textContent=fmtCountdown(rem); cdLbl.textContent='time until unlock';}
            else if(isReady){cdEl.className='cd-done'; cdEl.textContent='✓ Limit reset — ready to use'; cdLbl.textContent='can use now';}
            else{cdEl.className='cd-idle'; cdEl.textContent='--:--:--'; cdLbl.textContent='not locked';}
        }
        document.getElementById(`btn-unlock-${i}`).disabled=!acc.locked;
    }

    function updateStats() {
        const now=Date.now();
        let active=0, locked=0, nextMs=Infinity;
        accounts.forEach(acc=>{
            const rem=acc.unlockTime?acc.unlockTime-now:0;
            if(acc.locked&&rem>0){locked++; if(rem<nextMs) nextMs=rem;}
            else active++;
        });
        document.getElementById('stat-active').textContent=active;
        document.getElementById('stat-locked').textContent=locked;
        document.getElementById('stat-next').textContent=nextMs<Infinity?fmtCountdown(nextMs):'—';
        document.getElementById('total-count').textContent=TOTAL;
        accounts.forEach((_,i)=>updateCard(i));
    }

    document.getElementById('btn-reset-all').addEventListener('click', ()=>{
        if(confirm(`Reset all ${TOTAL} accounts?\nThis will unlock every account and clear all timers.`)){
            accounts.forEach(acc=>{ acc.locked=false; acc.lockTime=null; acc.unlockTime=null; });
            save(); updateStats();
            accounts.forEach((_,i)=>{ const picker=document.getElementById(`tp-${i}`); if(picker) picker.value=tsToLocal(Date.now()); });
        }
    });

    buildCards();
    updateStats();
    setInterval(updateStats, 1000);
</script>
